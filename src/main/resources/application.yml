spring:
  application:
    name: letSPT

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: chat-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 추가

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 1800000         # 30분 (Access Token)
  refresh-expiration-ms: 604800000  # 7일 (Refresh Token)

upload:
  profile-dir: ${UPLOAD_DIR:uploads/profile}

cookie:
  secure: ${COOKIE_SECURE:false}  # 운영: true(HTTPS 전용), 로컬: false(기본값)

spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 10MB