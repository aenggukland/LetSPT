<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category == 'LESSON' ? '수업내용' : (category == 'DIET' ? '식단 기록' : '운동 기록')} + ' — LetSPT'">게시판 — LetSPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #e8ff47;
            --text: #f0f0f0;
            --muted: #666;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
        }

        main {
            max-width: 860px;
            margin: 3rem auto;
            padding: 0 2rem;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.05em;
            color: var(--accent);
        }

        .btn-back {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--text); }

        .board-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .board-table th {
            padding: 0.85rem 1.25rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .board-table td {
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
        }

        .board-table tr:last-child td { border-bottom: none; }

        .board-table tr:hover td { background: rgba(232,255,71,0.03); }

        .board-table td a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .board-table td a:hover { color: var(--accent); }

        .board-table .col-date {
            color: var(--muted);
            font-size: 0.8rem;
            white-space: nowrap;
            width: 120px;
        }

        .empty-msg {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<main>
    <div class="page-header">
        <div class="page-title"
             th:text="${category == 'LESSON' ? '수업내용' : (category == 'DIET' ? '식단 기록' : '개인 운동 기록')}">
            게시판
        </div>
        <a href="/member/my-page" class="btn-back">← 내 정보로</a>
    </div>

    <table class="board-table" th:if="${not #lists.isEmpty(boards)}">
        <thead>
        <tr>
            <th>제목</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="board : ${boards}">
            <td>
                <a th:href="@{/api/board/{id}(id=${board.boardId})}"
                   th:text="${board.title}">제목</a>
            </td>
            <td class="col-date"
                th:text="${#temporals.format(board.createdAt, 'yyyy.MM.dd')}">날짜</td>
        </tr>
        </tbody>
    </table>

    <div class="empty-msg" th:if="${#lists.isEmpty(boards)}">
        아직 게시글이 없습니다.
    </div>
</main>

<th:block th:replace="~{fragments/navbar :: navbarScript}"></th:block>
</body>
</html>
