<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내정보 — LetSPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #e8ff47;
            --accent-dim: rgba(232,255,71,0.1);
            --text: #f0f0f0;
            --muted: #666;
            --danger: #ff4757;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
        }

        .page-wrap {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* 상단 영역: 챗봇 배너 absolute + 프로필 중앙 */
        .page-top {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        /* 하단: 카드 + 탈퇴 전체 너비 */
        .page-bottom {
            width: 100%;
        }

        /* ── AI 챗봇 배너 ── */
        .chatbot-banner {
            width: 220px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 1.25rem;
            position: absolute;
            left: 0;
            top: 0;
        }

        .chatbot-banner .badge {
            display: inline-block;
            background: var(--accent);
            color: #0a0a0a;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .chatbot-banner h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .chatbot-banner p {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .chatbot-banner .btn-go {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.6rem;
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .chatbot-banner .btn-go:hover { opacity: 0.85; }

        /* ── 프로필 섹션 ── */
        .profile-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
            width: 360px;
        }

        .profile-image-wrap {
            position: relative;
            margin-bottom: 1rem;
            width: 100px;
            height: 100px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            display: block;
        }

        /* 이미지 없을 때 빈 원 */
        .profile-avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar-placeholder svg {
            width: 44px;
            height: 44px;
            opacity: 0.3;
        }

        /* 연필 편집 버튼 */
        .profile-edit-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 30px;
            height: 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .profile-edit-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .profile-edit-btn svg {
            width: 14px;
            height: 14px;
            stroke: var(--muted);
            fill: none;
            transition: stroke 0.2s;
        }

        .profile-edit-btn:hover svg { stroke: var(--accent); }

        /* 이미지 편집 팝업 */
        .profile-img-popup {
            display: none;
            position: absolute;
            bottom: -6px;
            right: -90px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            min-width: 100px;
        }

        .profile-img-popup.open { display: block; }

        .profile-img-popup button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.65rem 1rem;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .profile-img-popup button:hover { background: rgba(255,255,255,0.05); }
        .profile-img-popup button:first-child { border-bottom: 1px solid var(--border); }
        .profile-img-popup button.danger { color: var(--danger); }

        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }

        .body-stats {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.4rem 1.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 320px;
        }

        .body-stats dt { color: var(--muted); }
        .body-stats dd { color: var(--text); }

        .btn-edit {
            padding: 0.6rem 2rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            text-decoration: none;
        }

        .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

        /* ── 게시글 카드 3단 ── */
        .board-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .board-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .board-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .board-card-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .board-card-header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .board-card-header a:hover { color: var(--accent); }

        .board-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .board-card ul li {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .board-card ul li:last-child { border-bottom: none; }

        .board-card ul li a {
            color: var(--text);
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            overflow: hidden;
        }

        .board-card ul li a span:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .board-card ul li a:hover { color: var(--accent); }

        .board-card ul li .record-date {
            color: var(--muted);
            flex-shrink: 0;
            font-size: 0.75rem;
        }

        .board-card .empty {
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
            padding: 1rem 0;
        }

        /* ── 탈퇴 ── */
        .withdraw-area {
            text-align: center;
            margin-bottom: 3rem;
        }

        .withdraw-area a {
            color: var(--muted);
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }

        .withdraw-area a:hover { color: var(--danger); }

        /* ── 토스트 ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--accent);
            color: #0a0a0a;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 500;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<div class="page-wrap">

    <!-- 상단: 챗봇 배너 + 프로필 -->
    <div class="page-top">

    <!-- AI 챗봇 배너 -->
    <aside class="chatbot-banner">
        <span class="badge">New</span>
        <h3>무엇이든 물어보세요!</h3>
        <p>오피지지 AI챗봇에서 LetSPT의 궁금한 모든 것을 물어보세요!</p>
        <a href="#" class="btn-go">바로가기 &rsaquo;</a>
    </aside>

        <!-- 프로필 -->
        <section class="profile-section">
            <div class="profile-image-wrap">
                <!-- 이미지 있을 때 -->
                <img th:if="${member.profileImageUrl != null}"
                     th:src="${member.profileImageUrl}"
                     id="profileImg" class="profile-avatar" alt="프로필 이미지">
                <!-- 이미지 없을 때: 빈 원 + 사람 아이콘 -->
                <div th:unless="${member.profileImageUrl != null}"
                     id="profilePlaceholder" class="profile-avatar-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </div>

                <button type="button" class="profile-edit-btn" onclick="toggleImgPopup(event)" title="이미지 편집">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </button>
                <div id="imgPopup" class="profile-img-popup">
                    <button type="button" onclick="openFileInput()">✏ 편집</button>
                    <button type="button" class="danger" onclick="deleteProfileImage()">✕ 삭제</button>
                </div>
                <input type="file" id="profileImageInput" accept="image/*" style="display:none"
                       onchange="uploadProfileImage(this)">
            </div>

            <div class="profile-name" th:text="${member.name != null ? member.name : member.username}">이름</div>

            <dl class="body-stats">
                <dt>키</dt>
                <dd th:text="${member.height != null ? member.height + ' cm' : '-'}">-</dd>

                <dt>몸무게</dt>
                <dd>
                    <span th:if="${member.weight != null and member.targetWeight != null}"
                          th:text="${member.weight + ' kg / ' + member.targetWeight + ' kg ( ' + #numbers.formatDecimal(member.weight - member.targetWeight, 1, 1) + ' kg 남음)'}"></span>
                    <span th:unless="${member.weight != null and member.targetWeight != null}"
                          th:text="${member.weight != null ? member.weight + ' kg' : '-'}"></span>
                </dd>

                <dt>나이</dt>
                <dd th:text="${member.age != null ? member.age + ' 세' : '-'}">-</dd>

                <dt>체지방</dt>
                <dd th:text="${member.bodyFatPercentage != null ? member.bodyFatPercentage + ' %' : '-'}">-</dd>

                <dt>헬스목적</dt>
                <dd th:text="${member.fitnessGoal != null ? member.fitnessGoal : '-'}">-</dd>
            </dl>

            <a href="/member/my-page/edit" class="btn-edit">정보수정</a>
        </section>

    </div><!-- /.page-top -->

    <!-- 하단: 게시글 3단 카드 (전체 너비) -->
    <div class="page-bottom">
        <div style="text-align:right; font-size:0.75rem; color:var(--muted); margin-bottom:0.5rem;">
            ※ 모든 게시글은 최신순으로 정렬됩니다.
        </div>
        <div class="board-cards">

            <!-- 수업내용 -->
            <div class="board-card">
                <div class="board-card-header">
                    <h3>수업내용</h3>
                    <a href="/member/board/lessons">&rsaquo;</a>
                </div>
                <ul th:if="${not #lists.isEmpty(recentLessons)}">
                    <li th:each="item : ${recentLessons}">
                        <a th:href="@{/api/board/{id}(id=${item.boardId})}">
                            <span th:text="${item.title}"></span>
                            <span class="record-date"
                                  th:text="${#temporals.format(item.createdAt, 'MM.dd')}"></span>
                        </a>
                    </li>
                </ul>
                <div class="empty" th:if="${#lists.isEmpty(recentLessons)}">수업 내용이 없습니다.</div>
            </div>

            <!-- 식단 기록 -->
            <div class="board-card">
                <div class="board-card-header">
                    <h3>식단 기록</h3>
                    <a href="/member/board/diets">&rsaquo;</a>
                </div>
                <ul th:if="${not #lists.isEmpty(recentDiets)}">
                    <li th:each="item : ${recentDiets}">
                        <a th:href="@{/api/board/{id}(id=${item.boardId})}">
                            <span th:text="${item.title}"></span>
                            <span class="record-date"
                                  th:text="${#temporals.format(item.createdAt, 'MM.dd')}"></span>
                        </a>
                    </li>
                </ul>
                <div class="empty" th:if="${#lists.isEmpty(recentDiets)}">식단 기록이 없습니다.</div>
            </div>

            <!-- 개인 운동 기록 -->
            <div class="board-card">
                <div class="board-card-header">
                    <h3>개인 운동 기록</h3>
                    <a href="/member/board/exercises">&rsaquo;</a>
                </div>
                <ul th:if="${not #lists.isEmpty(recentExercises)}">
                    <li th:each="item : ${recentExercises}">
                        <a th:href="@{/api/board/{id}(id=${item.boardId})}">
                            <span th:text="${item.title}"></span>
                            <span class="record-date"
                                  th:text="${#temporals.format(item.createdAt, 'MM.dd')}"></span>
                        </a>
                    </li>
                </ul>
                <div class="empty" th:if="${#lists.isEmpty(recentExercises)}">운동 기록이 없습니다.</div>
            </div>

        </div>

        <!-- 탈퇴하기 -->
        <div class="withdraw-area">
            <a onclick="confirmWithdraw()">탈퇴하기</a>
        </div>

    </div><!-- /.page-bottom -->

</div><!-- /.page-wrap -->

<div class="toast" id="toast"></div>

<th:block th:replace="~{fragments/navbar :: navbarScript}"></th:block>
<script>
    function authHeaders() {
        const token = localStorage.getItem('accessToken');
        return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => t.className = 'toast', 2500);
    }

    function toggleImgPopup(e) {
        e.stopPropagation();
        document.getElementById('imgPopup').classList.toggle('open');
    }

    function openFileInput() {
        document.getElementById('imgPopup').classList.remove('open');
        document.getElementById('profileImageInput').click();
    }

    async function deleteProfileImage() {
        document.getElementById('imgPopup').classList.remove('open');
        try {
            const res = await fetch('/api/member/me/profile-image', {
                method: 'DELETE',
                headers: authHeaders()
            });
            if (res.ok) {
                // 이미지 숨기고 플레이스홀더 표시
                const img = document.getElementById('profileImg');
                if (img) img.style.display = 'none';

                let placeholder = document.getElementById('profilePlaceholder');
                if (!placeholder) {
                    placeholder = document.createElement('div');
                    placeholder.id = 'profilePlaceholder';
                    placeholder.className = 'profile-avatar-placeholder';
                    placeholder.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>`;
                    document.querySelector('.profile-image-wrap').prepend(placeholder);
                } else {
                    placeholder.style.display = 'flex';
                }
                showToast('프로필 이미지가 삭제되었습니다.');
            } else {
                showToast('삭제에 실패했습니다.', true);
            }
        } catch (e) {
            showToast('서버에 연결할 수 없습니다.', true);
        }
    }

    // 팝업 외부 클릭 시 닫기
    document.addEventListener('click', () => {
        document.getElementById('imgPopup').classList.remove('open');
    });

    async function uploadProfileImage(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];

        // 파일 선택 즉시 동그라미에 미리보기
        const reader = new FileReader();
        reader.onload = (e) => {
            const placeholder = document.getElementById('profilePlaceholder');
            if (placeholder) placeholder.style.display = 'none';

            let img = document.getElementById('profileImg');
            if (!img) {
                img = document.createElement('img');
                img.id = 'profileImg';
                img.className = 'profile-avatar';
                img.alt = '프로필 이미지';
                document.querySelector('.profile-image-wrap').prepend(img);
            }
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);

        // 서버 업로드
        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/member/me/profile-image', {
                method: 'POST',
                headers: authHeaders(),
                body: formData
            });
            if (res.ok) {
                showToast('프로필 이미지가 변경되었습니다.');
            } else {
                showToast('이미지 업로드에 실패했습니다.', true);
            }
        } catch (e) {
            showToast('서버에 연결할 수 없습니다.', true);
        }
    }

    async function confirmWithdraw() {
        if (!confirm('정말 탈퇴하시겠습니까?\n탈퇴 후 모든 데이터는 복구되지 않습니다.')) return;
        const res = await fetch('/api/member/me', { method: 'DELETE', headers: authHeaders() });
        if (res.ok) {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            location.href = '/login';
        } else {
            showToast('탈퇴 처리 중 오류가 발생했습니다.', true);
        }
    }
</script>
</body>
</html>
